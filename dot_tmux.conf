# ~/.tmux.conf — quản lý bởi chezmoi (~/.local/share/chezmoi/dot_tmux.conf)

# ───────────────────────────── General ───────────────────────────────────
set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi
set -sg escape-time 0          # quan trọng cho nvim (không trễ ESC)
set -g focus-events on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g status-position top
set -g set-clipboard on        # copy ra clipboard hệ thống qua OSC52 (Ghostty hỗ trợ)

# Terminal: nhận diện đầy đủ Ghostty (RGB, clipboard, hyperlinks, bracketed paste)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB:clipboard:hyperlinks:usstyle"
set -as terminal-features ",*:RGB"

# ───────────────────────────── Keybindings ───────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded ✓"

# Split giữ nguyên thư mục hiện tại, phím trực quan | và -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Smart pane switch Ctrl-hjkl (tự nhận nvim -> chuyển split trong nvim)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Resize pane bằng prefix + HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# C-l giờ dùng để chuyển pane -> khôi phục clear-screen qua: prefix + C-l
bind C-l send-keys 'C-l'
# lazygit toàn màn hình (prefix + g)
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" lazygit
# Bật/tắt gõ đồng thời mọi pane (prefix + S) — tiện thao tác nhiều server
bind S setw synchronize-panes \; display "sync-panes #{?pane_synchronized,ON,OFF}"
# Popup shell tạm ở thư mục hiện tại (prefix + P), giữ nguyên prefix+p = previous-window
bind P display-popup -E -w 75% -h 75% -d "#{pane_current_path}"

# Copy mode kiểu vi: v bắt đầu chọn, y copy ra clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ───────────────────────────── Status bar (Catppuccin Mocha) ─────────────
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80
# Trái: tên session (đổi màu khi đang giữ prefix)
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e]#{?client_prefix,#[fg=#f38ba8] PREFIX,} "
# Phải: host · giờ · ngày
set -g status-right "#[fg=#a6e3a1] #H #[fg=#45475a]│#[fg=#cba6f7] %H:%M #[fg=#45475a]│#[fg=#fab387] %d-%b "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I #W "
setw -g window-status-format "#[fg=#6c7086] #I #W "
setw -g window-status-separator ""
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#cba6f7,fg=#1e1e2e"
set -g mode-style "bg=#89b4fa,fg=#1e1e2e"

# ───────────────────── Plugins (clone bởi chezmoi external) ───────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'          # tự khôi phục session khi mở tmux
set -g @continuum-save-interval '15'    # tự lưu mỗi 15 phút
# Nạp trực tiếp (không cần TPM). Continuum phải nạp gần CUỐI.
if-shell '[ -d ~/.config/tmux/plugins/tmux-yank ]'      'run-shell ~/.config/tmux/plugins/tmux-yank/yank.tmux'
if-shell '[ -d ~/.config/tmux/plugins/tmux-fzf ]'       'run-shell ~/.config/tmux/plugins/tmux-fzf/main.tmux'
if-shell '[ -d ~/.config/tmux/plugins/tmux-resurrect ]' 'run-shell ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux'
if-shell '[ -d ~/.config/tmux/plugins/tmux-continuum ]' 'run-shell ~/.config/tmux/plugins/tmux-continuum/continuum.tmux'
