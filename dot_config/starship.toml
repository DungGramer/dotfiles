add_newline = false

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$docker_context\
$python\
$golang\
$rust\
$cmd_duration\
$line_break\
$character
"""

[directory]
truncate_to_repo = false

[cmd_duration]
min_time = 1000

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
